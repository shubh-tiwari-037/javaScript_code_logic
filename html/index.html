<!-- STUDENT REGISTRATION FORM -->
<form>
    <section>

        <!-- Name -->
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" placeholder="Enter name" required>
        <br><br>

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Enter email" required>
        <br><br>

        <!-- Password -->
        <label for="password">Password:</label>
        <input type="password" name="password" id="password" placeholder="Enter password" required>
        <br><br>

        <!-- Gender Radio Buttons -->
        <label>Gender:</label><br>

        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label>

        <input type="radio" name="gender" id="other" value="other">
        <label for="other">Other</label>

        <br><br>

        <!-- Hobbies Checkboxes -->
        <label>Hobbies:</label><br>

        <input type="checkbox" name="hobbies[]" id="coding" value="coding">
        <label for="coding">Coding</label>

        <input type="checkbox" name="hobbies[]" id="travelling" value="travelling">
        <label for="travelling">Travelling</label>

        <input type="checkbox" name="hobbies[]" id="movies" value="watching movies">
        <label for="movies">Watching Movies</label>

        <br><br>

        <!-- Submit Button -->
        <button type="submit" 
        style="width: 100px; height: 30px; background-color: aqua; color: red;">
            Submit
        </button>

    </section>
</form>
